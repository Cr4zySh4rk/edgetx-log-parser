name: Build macOS Releases

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: x64
            label: Intel (x64)
          - arch: arm64
            label: Apple Silicon (arm64)
          - arch: universal
            label: Universal (x64 + arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build desktop assets
        run: npm run build:desktop
        env:
          VITE_BUILD_TARGET: desktop

      - name: Package macOS app (${{ matrix.label }})
        run: npx electron-builder --mac zip --${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: List release artifacts
        run: ls -lh release/

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-${{ matrix.arch }}
          path: |
            release/*.zip
            release/*.dmg
          if-no-files-found: warn

  create-release:
    needs: build-mac
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          body: |
            ## EdgeTX Log Parser – macOS Release

            ### Downloads
            | Variant | Description |
            |---------|-------------|
            | `*-mac-universal.zip` | Universal binary – runs natively on both Intel and Apple Silicon Macs |
            | `*-arm64-mac.zip` | Apple Silicon (M1/M2/M3) – native arm64 build |
            | `*-x64-mac.zip` | Intel (x64) – for older Intel Macs |

            ### Web App
            The web version is always available at: https://Cr4zySh4rk.github.io/edgetx-log-parser/
