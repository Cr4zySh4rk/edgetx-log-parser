name: Deploy Web App to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_BUILD_TARGET: web
          # Optional: set your Cesium ion token as a GitHub secret for full
          # 3D globe support. Without it the app falls back to a 2D map.
          VITE_CESIUM_TOKEN: ${{ secrets.VITE_CESIUM_TOKEN }}

      - name: Fix asset paths for GitHub Pages subpath
        run: |
          # GitHub Pages serves from /edgetx-log-parser/ — patch index.html
          # to use relative paths so assets resolve correctly.
          # vite.config.js already uses base: './' so this is a no-op in most
          # cases, but we copy the sample log and verify the build is intact.
          echo "Build output:"
          ls -lh dist/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
